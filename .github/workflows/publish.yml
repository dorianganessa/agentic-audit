name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build SDK
        run: cd packages/sdk && uv build
      - name: Publish SDK
        run: cd packages/sdk && uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-hook:
    runs-on: ubuntu-latest
    needs: publish-sdk
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Hook CLI
        run: cd packages/hook-cli && uv build
      - name: Publish Hook CLI
        run: cd packages/hook-cli && uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-mcp:
    runs-on: ubuntu-latest
    needs: publish-sdk
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build MCP Server
        run: cd packages/mcp-server && uv build
      - name: Publish MCP Server
        run: cd packages/mcp-server && uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
