{% extends "dashboard/base.html" %}

{% block title %}Login — AgenticAudit{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 2rem;">
    <h2>AgenticAudit Dashboard</h2>
    <p style="color: #666; margin-bottom: 1.5rem;">Enter your API key to access the dashboard.</p>

    {% if error %}
    <div class="flash flash-error" style="margin-bottom: 1rem; padding: 0.75rem; background: #fee; border: 1px solid #fcc; border-radius: 4px; color: #c33;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/dashboard/login">
        <label for="api_key" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">API Key</label>
        <input type="password" name="api_key" id="api_key" placeholder="aa_live_..."
               style="width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; font-family: monospace;"
               required>
        <button type="submit"
                style="width: 100%; padding: 0.6rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
