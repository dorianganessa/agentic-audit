[project]
name = "agentaudit-mcp"
version = "0.1.0"
description = "AgentAudit MCP server — lets agents query their own audit trail"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.0.0",
    "agentaudit",
]

[project.scripts]
agentaudit-mcp = "agentaudit_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentaudit_mcp"]
