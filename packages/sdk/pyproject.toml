[project]
name = "agentaudit"
version = "0.1.0"
description = "AgentAudit Python SDK — log, classify and audit AI agent actions"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.3.0"]

[project.scripts]
agentaudit-codex-watch = "agentaudit.integrations.codex_parser:watch_codex"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentaudit"]
