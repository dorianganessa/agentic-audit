[project]
name = "agentaudit-hook"
version = "0.1.0"
description = "AgentAudit CLI for Claude Code hooks"
requires-python = ">=3.12"
dependencies = [
    "agentaudit",
]

[project.scripts]
agentaudit-hook = "agentaudit_hook.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentaudit_hook"]
