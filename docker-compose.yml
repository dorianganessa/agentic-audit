services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      AGENTAUDIT_DATABASE_URL: postgresql+psycopg2://agentaudit:agentaudit@db:5432/agentaudit
      AGENTAUDIT_API_HOST: "0.0.0.0"
      AGENTAUDIT_API_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        uv run alembic -c src/agentaudit_api/alembic.ini upgrade head &&
        uv run python -m agentaudit_api.seed &&
        uv run uvicorn agentaudit_api.main:app --host 0.0.0.0 --port 8000
      "

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentaudit
      POSTGRES_PASSWORD: agentaudit
      POSTGRES_DB: agentaudit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentaudit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
